<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

  {% seo %}

  <script src="{{ '/assets/js/hash-scroll.js' | relative_url }}"></script>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="icon" type="image/png" href="{{ '/assets/favicon.png' | relative_url }}">
  <link rel="icon" type="image/x-icon" href="{{ '/assets/favicon.ico' | relative_url }}">

  <!-- Lightbox CSS -->
  <style>
  #lightbox-overlay {
    display: none;
    position: fixed;
    z-index: 9999;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.95);
    cursor: pointer;
    align-items: center;
    justify-content: center;
  }
  #lightbox-overlay.active {
    display: flex;
  }
  #lightbox-overlay img {
    max-width: 90%;
    max-height: 90%;
    object-fit: contain;
    cursor: default;
  }
  </style>
  
  <!-- Lightbox JavaScript -->
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    // Create lightbox overlay
    const overlay = document.createElement('div');
    overlay.id = 'lightbox-overlay';
    const img = document.createElement('img');
    overlay.appendChild(img);
    document.body.appendChild(overlay);
    
    // Open lightbox
    function openLightbox(src, alt) {
      img.src = src;
      img.alt = alt;
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    
    // Close lightbox
    function closeLightbox() {
      overlay.classList.remove('active');
      document.body.style.overflow = '';
    }
    
    // Click handler for lightbox images
    document.addEventListener('click', (e) => {
      const link = e.target.closest('a.lightbox-img');
      if (link) {
        e.preventDefault();
        const img = link.querySelector('img');
        if (img) {
          openLightbox(img.src, img.alt);
        }
      }
    });
    
    // Close on overlay click (but not on image)
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) {
        closeLightbox();
      }
    });
    
    // Close on Esc key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && overlay.classList.contains('active')) {
        closeLightbox();
      }
    });
  });
  </script>
</head>
