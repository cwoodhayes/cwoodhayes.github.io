<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

  {% seo %}

  <script src="{{ '/assets/js/hash-scroll.js' | relative_url }}"></script>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="icon" type="image/png" href="{{ '/assets/favicon.png' | relative_url }}">
  <link rel="icon" type="image/x-icon" href="{{ '/assets/favicon.ico' | relative_url }}">

  <!-- Lightbox CSS -->
  <style>
  .lightbox {
    display: none;
    position: fixed;
    z-index: 9999;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    width: 100%;
    height: 100%;
    padding: 1em;
    background-color: rgb(0, 0, 0);
    background-color: rgba(0, 0, 0, 0.95);
    cursor: pointer;
  }
  .lightbox:target {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .lightbox:hover,
  .lightbox:target:hover {
    background-color: rgba(0, 0, 0, 0.95);
    opacity: 1;
  }
  .lightbox span {
    display: block;
    width: 100%;
    height: 100%;
    background-position: center;
    background-repeat: no-repeat;
    background-size: contain;
    cursor: default;
  }
  </style>
  
  <!-- Lightbox Esc key handler -->
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && window.location.hash.startsWith('#img')) {
        window.location.hash = '#_';
      }
    });
  });
  </script>
</head>
